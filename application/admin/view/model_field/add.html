<!DOCTYPE html>
<html><head>
    <meta charset="utf-8">
    <title>童老师ThinkPHP交流群：484519446</title>

    <meta name="description" content="Dashboard">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <!--Basic Styles-->
    <link href="__admin__/style/bootstrap.css" rel="stylesheet">
    <link href="__admin__/style/font-awesome.css" rel="stylesheet">
    <link href="__admin__/style/weather-icons.css" rel="stylesheet">

    <!--Beyond styles-->
    <link id="beyond-link" href="__admin__/style/beyond.css" rel="stylesheet" type="text/css">
    <link href="__admin__/style/demo.css" rel="stylesheet">
    <link href="__admin__/style/typicons.css" rel="stylesheet">
    <link href="__admin__/style/animate.css" rel="stylesheet">
    <!--uploadify styles-->

</head>
<body>
<!-- 头部 -->
{include file="public/top"}
<!-- /头部 -->

<div class="main-container container-fluid">
    <div class="page-container">
        <!-- Page Sidebar -->
        {include file="public/left"}
        <!-- /Page Sidebar -->
        <!-- Page Content -->
        <div class="page-content">
            <!-- Page Breadcrumb -->
            <div class="page-breadcrumbs">
                <ul class="breadcrumb">
                    <li>
                        <a href="{:url('Index/lst')}">系统</a>
                    </li>
                    <li>
                        <a href="{:url('ModelField/lst')}">字段管理</a>
                    </li>
                    <li class="active">添加字段</li>
                </ul>
            </div>
            <!-- /Page Breadcrumb -->

            <!-- Page Body -->
            <div class="page-body">

                <div class="row">
                    <div class="col-lg-12 col-sm-12 col-xs-12">
                        <div class="widget">

                            <div class="widget-body">
                                <div id="horizontal-form">
                                    <form class="form-horizontal" role="form" method="post" enctype="multipart/form-data">
                                        <div class="tabbable">
                                            <ul class="nav nav-tabs  tabs-flat">
                                                <li class="active ">
                                                    <a data-toggle="tab" href="#FlatTab-1">添加字段</a>
                                                </li>
                                            </ul>
                                            <div class="tab-content  tabs-flat">
                                                <div class="active tab-pane" id="FlatTab-1">
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">关联模型</label>
                                                        <div class="col-sm-6">
                                                            <select name="mode_id" class="form-control">
                                                                {volist name="mode" id="vo"}
                                                                <option value="{$vo.id}">{$vo.model_name}</option>
                                                                {/volist}
                                                            </select>
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 必填</p>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">中文名称</label>
                                                        <div class="col-sm-6">
                                                            <input type="text" class="form-control" name="field_cname">
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 必填</p>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">英文名称</label>
                                                        <div class="col-sm-6">
                                                            <input type="text" class="form-control" name="field_ename">
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 必填</p>
                                                    </div>
                                                    <!--字段类型：1：单行文本2：单选按钮3：复选框4：下拉菜单5：文本域6：附件7：浮点8：整型9：长文本-->
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">字段类型</label>
                                                        <div class="col-sm-6">
                                                            <select name="field_type" class="form-control">
                                                                <option value="1">单行文本</option>
                                                                <option value="2">单选按钮</option>
                                                                <option value="3">复选框</option>
                                                                <option value="4">下拉菜单</option>
                                                                <option value="5">文本域</option>
                                                                <option value="6">附件</option>
                                                                <option value="7">浮点</option>
                                                                <option value="8">整型</option>
                                                                <option value="9">长文本</option>
                                                            </select>
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 必填</p>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">可选值</label>
                                                        <div class="col-sm-6">
                                                            <textarea name="field_values" class="form-control"></textarea>
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 不同选项，以英文状态的逗号隔开</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <div class="col-sm-offset-2 col-sm-10">
                                                <button type="submit" class="btn btn-default">保存信息</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <!-- /Page Body -->
        </div>
        <!-- /Page Content -->
    </div>
</div>

<!--Basic Scripts-->
<script src="__admin__/style/jquery_002.js"></script>
<script src="__admin__/style/bootstrap.js"></script>
<script src="__admin__/style/jquery.js"></script>
<!--Beyond Scripts-->
<script src="__admin__/style/beyond.js"></script>

<script src="__admin__/plugins/layer/layer.js"></script>





</body></html>
