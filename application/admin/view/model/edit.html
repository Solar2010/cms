{include file="public/meta"}
    <!--Beyond styles-->
    <link id="beyond-link" href="__admin__/style/beyond.css" rel="stylesheet" type="text/css">
    <link href="__admin__/style/demo.css" rel="stylesheet">
    <link href="__admin__/style/typicons.css" rel="stylesheet">
    <link href="__admin__/style/animate.css" rel="stylesheet">
    <!--uploadify styles-->

</head>
<body>
<!-- 头部 -->
{include file="public/top"}
<!-- /头部 -->

<div class="main-container container-fluid">
    <div class="page-container">
        <!-- Page Sidebar -->
        {include file="public/left"}
        <!-- /Page Sidebar -->
        <!-- Page Content -->
        <div class="page-content">
            <!-- Page Breadcrumb -->
            <div class="page-breadcrumbs">
                <ul class="breadcrumb">
                    <li>
                        <a href="{:url('Index/lst')}">系统</a>
                    </li>
                    <li>
                        <a href="{:url('Model/lst')}">模型管理</a>
                    </li>
                    <li class="active">修改模型</li>
                </ul>
            </div>
            <!-- /Page Breadcrumb -->

            <!-- Page Body -->
            <div class="page-body">

                <div class="row">
                    <div class="col-lg-12 col-sm-12 col-xs-12">
                        <div class="widget">

                            <div class="widget-body">
                                <div id="horizontal-form">
                                    <form class="form-horizontal" role="form" method="post" enctype="multipart/form-data">
                                        <input type="hidden" name="id" value="{$model.id}">
                                        <input type="hidden" name="old_table_name" value="{$model.table_name}">
                                        <div class="tabbable">
                                            <ul class="nav nav-tabs  tabs-flat">
                                                <li class="active ">
                                                    <a data-toggle="tab" href="#FlatTab-1">修改模型</a>
                                                </li>
                                            </ul>
                                            <div class="tab-content  tabs-flat">
                                                <div class="active tab-pane" id="FlatTab-1">
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">模型名称</label>
                                                        <div class="col-sm-6">
                                                            <input type="text" class="form-control" name="model_name" value="{$model.model_name}">
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 必填</p>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">附加表名</label>
                                                        <div class="col-sm-6">
                                                            <input type="text" class="form-control" name="table_name" value="{$model.table_name}">
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 必填</p>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2 control-label no-padding-right">开启状态</label>
                                                        <div class="col-sm-6">
                                                            <div class="checkbox">
                                                                <label>
                                                                    <input {if condition="$model['status'] eq 1"}checked="checked"{/if} class="checkbox-slider  colored-blue" name="status" type="checkbox" value="1">
                                                                    <span class="text"></span>
                                                                </label>
                                                            </div>
                                                        </div>
                                                        <p class="help-block col-sm-4 red">* 必填</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <div class="col-sm-offset-2 col-sm-10">
                                                <button type="submit" class="btn btn-default">保存信息</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <!-- /Page Body -->
        </div>
        <!-- /Page Content -->
    </div>
</div>

<!--Basic Scripts-->
<script src="__admin__/style/jquery_002.js"></script>
<script src="__admin__/style/bootstrap.js"></script>
<script src="__admin__/style/jquery.js"></script>
<!--Beyond Scripts-->
<script src="__admin__/style/beyond.js"></script>

<script src="__admin__/plugins/layer/layer.js"></script>





</body></html>
